# docker-compose.yml
version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: youtube_rag_backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - rag_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: youtube_rag_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag_network

networks:
  rag_network:
    driver: bridge