services:

  backend:
    image: ${ECR_REGISTRY}/${ECR_BACKEND_REPO}:latest
    container_name: youtube_rag_backend
    ports:
      - "5000:5000"
    env_file:
      - /home/ubuntu/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rag_network

  frontend:
    image: ${ECR_REGISTRY}/${ECR_FRONTEND_REPO}:latest
    container_name: youtube_rag_frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag_network

networks:
  rag_network:
    driver: bridge